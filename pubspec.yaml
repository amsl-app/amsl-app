name: amsl_app
description: A self-regulated learning app

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.4.13+32

environment:
  sdk: ">=3.10.0 <4.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  async: ^2.13.1
  http: ^1.2.2
  numberpicker: ^2.1.2
  flutter_keyboard_visibility: ^6.0.0
  json_serializable: ^6.11.2
  flutter_svg: ^2.0.7
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.0.0
  json_annotation: ^4.9.0
  logging: ^1.0.2
  shared_preferences: ^2.2.0
  cached_network_image: ^3.4.1
  gap: ^3.0.1
  percent_indicator: ^4.2.4
  theme_tailor_annotation: ^3.0.1
  ionicons: ^0.2.1
  fast_immutable_collections: ^11.0.0
  collection: ^1.19.0
  backdrop: ^0.9.0
  url_launcher: ^6.2.2
  hooks_riverpod: ^3.1.0
  freezed_annotation: ^3.0.0
  riverpod_annotation: ^4.0.0
  intl: ^0.20.2
  blur: ^4.0.0
  shimmer: ^3.0.0
  go_router: ^17.2.0
  circular_countdown_timer: ^0.2.3
  pausable_timer: ^3.1.0+3
  flutter_custom_license_page: ^0.0.3
  package_info_plus: ^9.0.1
  pub_semver: ^2.1.3
  scrollable_positioned_list: ^0.3.5
  photo_view: ^0.15.0
  sentry_flutter: ^9.17.0
  iconoir_flutter: ^7.3.0
  matomo_tracker: ^6.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  moment_dart: ^5.0.1
  pdf: ^3.10.7
  path_provider: ^2.1.5
  open_file: ^3.3.2
  flutter_shakemywidget: ^1.0.5+1
  flutter_glow: ^0.3.0
  base32: ^2.1.3
  web_socket_channel: ^3.0.1
  feedback: ^3.1.0
  feedback_sentry: ^3.0.1
  flutter_markdown_plus_latex: ^1.0.5
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.2.2
  http_parser: ^4.0.2
  gif: ^2.3.0
  record: ^6.0.0
  flutter_pcm_sound: ^3.1.1
  pdfx: ^2.9.2
  flutter_timezone: ^5.0.1
  app_badge_plus: ^1.2.6
  flutter_hooks: ^0.21.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  custom_lint: ^0.8.1
  flutter_launcher_icons: ^0.14.1
  theme_tailor: ^3.1.1
  freezed: ^3.2.3
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  flutter_flavorizr: ^2.2.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/welcome_screen/
    - assets/images/avatar_images/
    - assets/images/story_sets/
    - assets/images/highlights/
    - assets/images/profile/
    - assets/images/journal/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Mulish
      fonts:
        - asset: fonts/Mulish-VariableFont_wght.ttf
        - asset: fonts/Mulish-Italic-VariableFont_wght.ttf
          style: italic

flavorizr:
  instuctions:
    - flutter:targets

  flavors:
    dev:
      app:
        name: "Amsl Dev"

      android:
        applicationId: "edu.kit.iism.issd.amsl.app.dev"
        generateDummyAssets: false
        icon: "assets/icon/dev/icon.png"

      ios:
        bundleId: "edu.kit.iism.issd.amsl.app.dev"
        generateDummyAssets: false

    qa:
      app:
        name: "Amsl Test"

      android:
        applicationId: "edu.kit.iism.issd.amsl.app.test"
        generateDummyAssets: false
        icon: "assets/icon/test/icon.png"

      ios:
        bundleId: "edu.kit.iism.issd.amsl.app.test"
        generateDummyAssets: false

    staging:
      app:
        name: "Amsl Staging"

      android:
        applicationId: "edu.kit.iism.issd.amsl.app.staging"
        generateDummyAssets: false
        icon: "assets/icon/staging/icon.png"

      ios:
        bundleId: "edu.kit.iism.issd.amsl.app.staging"
        generateDummyAssets: false

    prod:
      app:
        name: "Amsl"

      android:
        applicationId: "edu.kit.iism.issd.amsl.app"
        generateDummyAssets: false
        icon: "assets/icon/prod/icon.png"

      ios:
        bundleId: "edu.kit.iism.issd.amsl.app"
        generateDummyAssets: false
